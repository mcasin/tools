<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diferencia entre Fechas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f1f5f9;
    --card-bg: #fff;
    --card-shadow: rgba(0,0,0,.08);
    --text: #0f172a;
    --label: #334155;
    --label-span: #64748b;
    --input-bg: #f8fafc;
    --input-border: #e2e8f0;
    --input-focus-bg: #fff;
    --btn-bg: #f8fafc;
    --btn-text: #334155;
    --btn-border: #e2e8f0;
    --btn-hover: #93c5fd;
    --accent: #3b82f6;
    --accent-text: #fff;
    --slider-track: #e2e8f0;
    --slider-thumb-border: #fff;
    --range-label: #94a3b8;
    --results-bg: #f8fafc;
    --row-border: #e2e8f0;
    --row-label: #64748b;
    --row-value: #0f172a;
    --positive: #16a34a;
    --disclaimer: #94a3b8;
    --toggle-bg: #e2e8f0;
    --toggle-color: #64748b;
  }
  [data-theme="dark"] {
    --bg: #0f172a;
    --card-bg: #1e293b;
    --card-shadow: rgba(0,0,0,.4);
    --text: #f1f5f9;
    --label: #cbd5e1;
    --label-span: #94a3b8;
    --input-bg: #334155;
    --input-border: #475569;
    --input-focus-bg: #334155;
    --btn-bg: #334155;
    --btn-text: #cbd5e1;
    --btn-border: #475569;
    --btn-hover: #3b82f6;
    --accent: #3b82f6;
    --accent-text: #fff;
    --slider-track: #475569;
    --slider-thumb-border: #1e293b;
    --range-label: #64748b;
    --results-bg: #0f172a;
    --row-border: #334155;
    --row-label: #94a3b8;
    --row-value: #f1f5f9;
    --positive: #4ade80;
    --disclaimer: #64748b;
    --toggle-bg: #334155;
    --toggle-color: #f1f5f9;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
    transition: background .3s;
  }
  .card {
    background: var(--card-bg); border-radius: 20px; padding: 40px; max-width: 520px; width: 100%;
    box-shadow: 0 4px 24px var(--card-shadow); transition: background .3s;
  }
  .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
  h1 { font-size: 24px; font-weight: 700; color: var(--text); margin: 0; }
  .head-buttons { display: flex; gap: 8px; }
  #langToggle {
    background: var(--toggle-bg); border: none; border-radius: 10px; width: 40px; height: 40px;
    font-size: 13px; font-weight: 700; cursor: pointer; color: var(--toggle-color); transition: .2s;
    display: flex; align-items: center; justify-content: center;
  }
  #langToggle:hover { opacity: .8; }
  #themeToggle {
    background: var(--toggle-bg); border: none; border-radius: 10px; width: 40px; height: 40px;
    font-size: 20px; cursor: pointer; color: var(--toggle-color); transition: .2s;
    display: flex; align-items: center; justify-content: center;
  }
  #themeToggle:hover { opacity: .8; }
  .head-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .head-left h1 { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .back-btn {
    background: var(--toggle-bg); border: none; border-radius: 10px; width: 36px; height: 36px;
    font-size: 16px; cursor: pointer; color: var(--toggle-color); transition: .2s; text-decoration: none;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .back-btn:hover { opacity: .8; }
  .field { margin-bottom: 24px; position: relative; }
  label { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: var(--label); margin-bottom: 6px; }
  label span { font-weight: 400; color: var(--label-span); }
  input[type="text"] {
    width: 100%; padding: 12px 14px; font-size: 16px; border: 1.5px solid var(--input-border); border-radius: 10px;
    background: var(--input-bg); transition: border-color .2s, background .3s; outline: none; color: var(--text);
    font-family: inherit; cursor: pointer;
  }
  input[type="text"]:focus { border-color: var(--accent); background: var(--input-focus-bg); }
  .error { color: #ef4444; font-size: 13px; margin-top: 4px; display: none; }
  .calendar-popup {
    position: absolute; top: 100%; left: 0; z-index: 10; margin-top: 6px; width: 100%;
    background: var(--card-bg); border: 1.5px solid var(--input-border); border-radius: 14px;
    padding: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.15); display: none;
  }
  .calendar-popup.open { display: block; }
  .cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .cal-head button {
    background: none; border: none; width: 32px; height: 32px; border-radius: 8px;
    font-size: 16px; cursor: pointer; color: var(--text); transition: .1s;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-head button:hover { background: var(--btn-hover); }
  .cal-selects { display: flex; gap: 4px; align-items: center; }
  .cal-selects select {
    padding: 4px 6px; font-size: 13px; font-weight: 600; border: 1px solid var(--input-border); border-radius: 6px;
    background: var(--input-bg); color: var(--text); cursor: pointer; outline: none; font-family: inherit;
  }
  .cal-selects select:focus { border-color: var(--accent); }
  .cal-selects .cal-month { width: 110px; }
  .cal-selects .cal-year { width: 70px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow {
    text-align: center; font-size: 11px; font-weight: 600; color: var(--label-span); padding: 4px 0;
  }
  .cal-day {
    text-align: center; padding: 7px 0; font-size: 13px; border-radius: 8px; cursor: pointer;
    color: var(--text); transition: .1s;
  }
  .cal-day:hover { background: var(--btn-hover); }
  .cal-day.selected { background: var(--accent); color: var(--accent-text); }
  .cal-day.other { color: var(--label-span); opacity: .4; }
  .cal-day.today { font-weight: 700; }
  .results { background: var(--results-bg); border-radius: 12px; padding: 20px; margin-top: 28px; transition: background .3s; }
  .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 15px; }
  .row + .row { border-top: 1px solid var(--row-border); }
  .row .label { color: var(--row-label); }
  .row .value { font-weight: 600; color: var(--row-value); text-align: right; }
  .row.highlight .value { color: var(--positive); font-size: 20px; }
  .disclaimer { font-size: 12px; color: var(--disclaimer); margin-top: 16px; text-align: center; line-height: 1.5; }
  @media (max-width: 480px) { .card { padding: 24px; } }
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <div class="head-left">
      <a class="back-btn" href="index.html" aria-label="Volver">←</a>
      <h1 data-i18n="title">Diferencia entre Fechas</h1>
    </div>
    <div class="head-buttons">
      <button id="langToggle" aria-label="Cambiar idioma">ES</button>
      <button id="themeToggle" aria-label="Cambiar tema">🌙</button>
    </div>
  </div>

  <div class="field">
    <label><span data-i18n="startDate">Fecha de inicio</span> <span data-i18n="dateFormat">DD/MM/AAAA</span></label>
    <input type="text" id="date1" placeholder="DD/MM/AAAA" autocomplete="off" spellcheck="false" inputmode="none">
    <div class="error" id="error1" data-i18n="invalidDate">Fecha no válida</div>
    <div class="calendar-popup" id="cal1">
      <div class="cal-head">
        <button class="cal-prev" type="button">‹</button>
        <div class="cal-selects">
          <select class="cal-month"></select>
          <select class="cal-year"></select>
        </div>
        <button class="cal-next" type="button">›</button>
      </div>
      <div class="cal-grid"></div>
    </div>
  </div>

  <div class="field">
    <label><span data-i18n="endDate">Fecha de fin</span> <span data-i18n="dateFormat">DD/MM/AAAA</span></label>
    <input type="text" id="date2" placeholder="DD/MM/AAAA" autocomplete="off" spellcheck="false" inputmode="none">
    <div class="error" id="error2" data-i18n="invalidDate">Fecha no válida</div>
    <div class="calendar-popup" id="cal2">
      <div class="cal-head">
        <button class="cal-prev" type="button">‹</button>
        <div class="cal-selects">
          <select class="cal-month"></select>
          <select class="cal-year"></select>
        </div>
        <button class="cal-next" type="button">›</button>
      </div>
      <div class="cal-grid"></div>
    </div>
  </div>

  <div class="results">
    <div class="row highlight">
      <span class="label" data-i18n="diffDays">Días de diferencia</span>
      <span class="value" id="diffDays">--</span>
    </div>
    <div class="row">
      <span class="label" data-i18n="diffMonths">Meses de diferencia</span>
      <span class="value" id="diffMonths">--</span>
    </div>
    <div class="row">
      <span class="label" data-i18n="diffYears">Años de diferencia</span>
      <span class="value" id="diffYears">--</span>
    </div>
    <div class="row">
      <span class="label" data-i18n="dayOfWeekStart">Día de la semana (inicio)</span>
      <span class="value" id="dayOfWeek1">--</span>
    </div>
    <div class="row">
      <span class="label" data-i18n="dayOfWeekEnd">Día de la semana (fin)</span>
      <span class="value" id="dayOfWeek2">--</span>
    </div>
  </div>

  <div class="disclaimer" data-i18n="disclaimer">
    Todos los cálculos tienen en cuenta años bisiestos.
  </div>
</div>

<script>
  const i18n = {
    es: {
      title: 'Diferencia entre Fechas',
      startDate: 'Fecha de inicio',
      endDate: 'Fecha de fin',
      dateFormat: 'DD/MM/AAAA',
      invalidDate: 'Fecha no válida',
      diffDays: 'Días de diferencia',
      diffMonths: 'Meses de diferencia',
      diffYears: 'Años de diferencia',
      dayOfWeekStart: 'Día de la semana (inicio)',
      dayOfWeekEnd: 'Día de la semana (fin)',
      disclaimer: 'Todos los cálculos tienen en cuenta años bisiestos.',
      yearsAbbr: 'a',
      monthsAbbr: 'm',
      daysAbbr: 'd',
    },
    en: {
      title: 'Date Difference',
      startDate: 'Start Date',
      endDate: 'End Date',
      dateFormat: 'DD/MM/YYYY',
      invalidDate: 'Invalid date',
      diffDays: 'Days Difference',
      diffMonths: 'Months Difference',
      diffYears: 'Years Difference',
      dayOfWeekStart: 'Day of Week (Start)',
      dayOfWeekEnd: 'Day of Week (End)',
      disclaimer: 'All calculations account for leap years.',
      yearsAbbr: 'y',
      monthsAbbr: 'm',
      daysAbbr: 'd',
    },
  };

  let lang = localStorage.getItem('lang') || 'es';

  function t(key) {
    return (i18n[lang] && i18n[lang][key]) || i18n['es'][key] || key;
  }

  function getLocale() {
    return lang === 'es' ? 'es-ES' : 'en-US';
  }

  const date1El = document.getElementById('date1');
  const date2El = document.getElementById('date2');
  const error1 = document.getElementById('error1');
  const error2 = document.getElementById('error2');
  const diffDays = document.getElementById('diffDays');
  const diffMonths = document.getElementById('diffMonths');
  const diffYears = document.getElementById('diffYears');
  const dayOfWeek1 = document.getElementById('dayOfWeek1');
  const dayOfWeek2 = document.getElementById('dayOfWeek2');

  function parseDate(str) {
    const m = str.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (!m) return null;
    const d = new Date(+m[3], +m[2] - 1, +m[1]);
    if (d.getDate() !== +m[1] || d.getMonth() !== +m[2] - 1) return null;
    return d;
  }

  function fmtDate(d) {
    return String(d.getDate()).padStart(2, '0') + '/' +
           String(d.getMonth() + 1).padStart(2, '0') + '/' +
           d.getFullYear();
  }

  function calc() {
    const d1 = parseDate(date1El.value);
    const d2 = parseDate(date2El.value);

    if (!d1) { error1.style.display = 'block'; date1El.style.borderColor = '#ef4444'; }
    else { error1.style.display = 'none'; date1El.style.borderColor = ''; }
    if (!d2) { error2.style.display = 'block'; date2El.style.borderColor = '#ef4444'; }
    else { error2.style.display = 'none'; date2El.style.borderColor = ''; }

    if (!d1 || !d2) {
      diffDays.textContent = '--';
      diffMonths.textContent = '--';
      diffYears.textContent = '--';
      dayOfWeek1.textContent = '--';
      dayOfWeek2.textContent = '--';
      return;
    }

    const ms = Math.abs(d2 - d1);
    const days = Math.round(ms / (1000 * 60 * 60 * 24));

    const start = new Date(Math.min(d1, d2));
    const end = new Date(Math.max(d1, d2));

    let y = end.getFullYear() - start.getFullYear();
    let m = end.getMonth() - start.getMonth();
    let d = end.getDate() - start.getDate();

    if (d < 0) {
      m--;
      const prev = new Date(end.getFullYear(), end.getMonth(), 0);
      d += prev.getDate();
    }
    if (m < 0) {
      y--;
      m += 12;
    }

    const totalMonths = y * 12 + m;
    const opts = { weekday: 'long' };
    const dow1 = d1.toLocaleDateString(getLocale(), opts);
    const dow2 = d2.toLocaleDateString(getLocale(), opts);

    diffDays.textContent = days.toLocaleString(getLocale());
    diffMonths.textContent = totalMonths.toLocaleString(getLocale());
    diffYears.textContent = y + t('yearsAbbr') + ' ' + m + t('monthsAbbr') + ' ' + d + t('daysAbbr');
    dayOfWeek1.textContent = dow1.charAt(0).toUpperCase() + dow1.slice(1);
    dayOfWeek2.textContent = dow2.charAt(0).toUpperCase() + dow2.slice(1);
  }

  const today = new Date();
  const past = new Date(today);
  past.setDate(today.getDate() - 90);
  date1El.value = fmtDate(past);
  date2El.value = fmtDate(today);

  [date1El, date2El].forEach(el => el.addEventListener('input', calc));
  calc();

  function setupCalendar(inputEl, popupEl) {
    let viewDate = new Date();
    let selectedDate = null;
    let isOpen = false;

    function render() {
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const startOffset = (firstDay + 6) % 7;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrev = new Date(year, month, 0).getDate();
      const today = new Date();

      const monthNames = [];
      for (let i = 0; i < 12; i++) {
        const d = new Date(2000, i, 1);
        monthNames.push(d.toLocaleDateString(getLocale(), { month: 'long' }));
      }

      const monthSel = popupEl.querySelector('.cal-month');
      const yearSel = popupEl.querySelector('.cal-year');
      monthSel.innerHTML = monthNames.map((name, i) =>
        '<option value="' + i + '"' + (i === month ? ' selected' : '') + '>' + name.charAt(0).toUpperCase() + name.slice(1) + '</option>'
      ).join('');
      if (monthSel.value !== String(month)) monthSel.value = month;

      yearSel.innerHTML = '';
      for (let y = year - 150; y <= year + 150; y++) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        if (y === year) opt.selected = true;
        yearSel.appendChild(opt);
      }
      if (yearSel.value !== String(year)) yearSel.value = year;

      const weekdays = getLocale() === 'es-ES'
        ? ['Lu','Ma','Mi','Ju','Vi','Sa','Do']
        : ['Mo','Tu','We','Th','Fr','Sa','Su'];

      let html = '<div class="cal-dow">' + weekdays.join('</div><div class="cal-dow">') + '</div>';

      for (let i = startOffset - 1; i >= 0; i--) {
        const day = daysInPrev - i;
        const ym = new Date(year, month - 1);
        html += '<div class="cal-day other" data-y="' + ym.getFullYear() + '" data-m="' + ym.getMonth() + '" data-d="' + day + '">' + day + '</div>';
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cls = ['cal-day'];
        if (selectedDate && day === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear()) cls.push('selected');
        if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) cls.push('today');
        html += '<div class="' + cls.join(' ') + '" data-y="' + year + '" data-m="' + month + '" data-d="' + day + '">' + day + '</div>';
      }

      const total = startOffset + daysInMonth;
      const remaining = (7 - total % 7) % 7;
      for (let day = 1; day <= remaining; day++) {
        const ym = new Date(year, month + 1);
        html += '<div class="cal-day other" data-y="' + ym.getFullYear() + '" data-m="' + ym.getMonth() + '" data-d="' + day + '">' + day + '</div>';
      }

      popupEl.querySelector('.cal-grid').innerHTML = html;

      popupEl.querySelectorAll('.cal-day').forEach(el => {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          const y = parseInt(this.dataset.y);
          const m = parseInt(this.dataset.m);
          const d = parseInt(this.dataset.d);
          const date = new Date(y, m, d);
          inputEl.value = fmtDate(date);
          selectedDate = date;
          close();
          inputEl.dispatchEvent(new Event('input', { bubbles: true }));
        });
      });
    }

    function open() {
      const parsed = parseDate(inputEl.value);
      if (parsed) {
        selectedDate = parsed;
        viewDate = new Date(parsed.getFullYear(), parsed.getMonth(), 1);
      } else {
        selectedDate = null;
        viewDate = new Date();
        viewDate.setDate(1);
      }
      render();
      popupEl.classList.add('open');
      isOpen = true;
    }

    function close() {
      popupEl.classList.remove('open');
      isOpen = false;
    }

    inputEl.addEventListener('focus', function() {
      document.querySelectorAll('.calendar-popup.open').forEach(p => {
        if (p !== popupEl) p.classList.remove('open');
      });
      open();
    });

    popupEl.querySelector('.cal-prev').addEventListener('click', function(e) {
      e.stopPropagation();
      viewDate.setMonth(viewDate.getMonth() - 1);
      render();
    });

    popupEl.querySelector('.cal-next').addEventListener('click', function(e) {
      e.stopPropagation();
      viewDate.setMonth(viewDate.getMonth() + 1);
      render();
    });

    popupEl.querySelector('.cal-month').addEventListener('change', function(e) {
      e.stopPropagation();
      viewDate.setMonth(parseInt(this.value));
      render();
    });

    popupEl.querySelector('.cal-year').addEventListener('change', function(e) {
      e.stopPropagation();
      viewDate.setFullYear(parseInt(this.value));
      render();
    });

    document.addEventListener('click', function(e) {
      if (isOpen && !popupEl.contains(e.target) && e.target !== inputEl) {
        close();
      }
    });
  }

  setupCalendar(date1El, document.getElementById('cal1'));
  setupCalendar(date2El, document.getElementById('cal2'));

  function applyLang() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });
    langToggle.textContent = lang === 'es' ? 'EN' : 'ES';
    document.querySelectorAll('.calendar-popup.open').forEach(p => p.classList.remove('open'));
    calc();
  }

  const langToggle = document.getElementById('langToggle');
  langToggle.addEventListener('click', () => {
    lang = lang === 'es' ? 'en' : 'es';
    localStorage.setItem('lang', lang);
    applyLang();
  });

  const themeToggle = document.getElementById('themeToggle');
  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', theme);
  }
  themeToggle.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    setTheme(next);
  });
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    setTheme('dark');
  }

  applyLang();
</script>
</body>
</html>
