<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Hipoteca</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f1f5f9;
    --card-bg: #fff;
    --card-shadow: rgba(0,0,0,.08);
    --text: #0f172a;
    --label: #334155;
    --label-span: #64748b;
    --input-bg: #f8fafc;
    --input-border: #e2e8f0;
    --input-focus-bg: #fff;
    --btn-bg: #f8fafc;
    --btn-text: #334155;
    --btn-border: #e2e8f0;
    --btn-hover: #93c5fd;
    --accent: #3b82f6;
    --accent-text: #fff;
    --slider-track: #e2e8f0;
    --slider-thumb-border: #fff;
    --range-label: #94a3b8;
    --results-bg: #f8fafc;
    --row-border: #e2e8f0;
    --row-label: #64748b;
    --row-value: #0f172a;
    --positive: #16a34a;
    --disclaimer: #94a3b8;
    --toggle-bg: #e2e8f0;
    --toggle-color: #64748b;
  }
  [data-theme="dark"] {
    --bg: #0f172a;
    --card-bg: #1e293b;
    --card-shadow: rgba(0,0,0,.4);
    --text: #f1f5f9;
    --label: #cbd5e1;
    --label-span: #94a3b8;
    --input-bg: #334155;
    --input-border: #475569;
    --input-focus-bg: #334155;
    --btn-bg: #334155;
    --btn-text: #cbd5e1;
    --btn-border: #475569;
    --btn-hover: #3b82f6;
    --accent: #3b82f6;
    --accent-text: #fff;
    --slider-track: #475569;
    --slider-thumb-border: #1e293b;
    --range-label: #64748b;
    --results-bg: #0f172a;
    --row-border: #334155;
    --row-label: #94a3b8;
    --row-value: #f1f5f9;
    --positive: #4ade80;
    --disclaimer: #64748b;
    --toggle-bg: #334155;
    --toggle-color: #f1f5f9;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
    transition: background .3s;
  }
  .card {
    background: var(--card-bg); border-radius: 20px; padding: 40px; max-width: 520px; width: 100%;
    box-shadow: 0 4px 24px var(--card-shadow); transition: background .3s;
  }
  .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
  h1 { font-size: 24px; font-weight: 700; color: var(--text); margin: 0; }
  #themeToggle {
    background: var(--toggle-bg); border: none; border-radius: 10px; width: 40px; height: 40px;
    font-size: 20px; cursor: pointer; color: var(--toggle-color); transition: .2s;
    display: flex; align-items: center; justify-content: center;
  }
  #themeToggle:hover { opacity: .8; }
  .field { margin-bottom: 24px; }
  label { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: var(--label); margin-bottom: 6px; }
  label span { font-weight: 400; color: var(--label-span); }
  input[type="number"] {
    width: 100%; padding: 12px 14px; font-size: 16px; border: 1.5px solid var(--input-border); border-radius: 10px;
    background: var(--input-bg); transition: border-color .2s, background .3s; outline: none; color: var(--text);
  }
  input[type="number"]:focus { border-color: var(--accent); background: var(--input-focus-bg); }
  input[type="number"]::-webkit-inner-spin-button { opacity: .5; }
  .btn-group { display: flex; gap: 8px; }
  .btn-group button {
    flex: 1; padding: 10px; font-size: 14px; font-weight: 600; border: 1.5px solid var(--btn-border); border-radius: 10px;
    background: var(--btn-bg); color: var(--btn-text); cursor: pointer; transition: all .2s;
  }
  .btn-group button:hover { border-color: var(--btn-hover); }
  .btn-group button.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
  input[type="range"] {
    width: 100%; height: 6px; border-radius: 3px; background: var(--slider-track);
    -webkit-appearance: none; appearance: none; outline: none; margin-top: 4px; transition: background .3s;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid var(--slider-thumb-border); box-shadow: 0 1px 4px rgba(0,0,0,.15);
  }
  input[type="range"]::-moz-range-thumb {
    width: 20px; height: 20px; border-radius: 50%; background: var(--accent);
    cursor: pointer; border: 2px solid var(--slider-thumb-border); box-shadow: 0 1px 4px rgba(0,0,0,.15);
  }
  .range-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--range-label); margin-top: 2px; }
  .results { background: var(--results-bg); border-radius: 12px; padding: 20px; margin-top: 28px; transition: background .3s; }
  .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 15px; }
  .row + .row { border-top: 1px solid var(--row-border); }
  .row .label { color: var(--row-label); }
  .row .value { font-weight: 600; color: var(--row-value); }
  .row.highlight .value { color: var(--positive); font-size: 20px; }
  .disclaimer { font-size: 12px; color: var(--disclaimer); margin-top: 16px; text-align: center; line-height: 1.5; }
  @media (max-width: 480px) { .card { padding: 24px; } }
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <h1>Simulador de Hipoteca</h1>
    <button id="themeToggle" aria-label="Cambiar tema">🌙</button>
  </div>

  <div class="field">
    <label>Precio de la vivienda</label>
    <input type="number" id="price" value="200000" step="10000" min="10000">
  </div>

  <div class="field">
    <label>Financiación bancaria</label>
    <div class="btn-group" id="financing">
      <button type="button" data-value="0.8" class="active">80%</button>
      <button type="button" data-value="0.9">90%</button>
      <button type="button" data-value="1.0">100%</button>
    </div>
  </div>

  <div class="field">
    <label>Plazo <span id="yearsLabel">30 años</span></label>
    <input type="range" id="years" min="25" max="40" value="30" step="1">
    <div class="range-labels"><span>25 años</span><span>40 años</span></div>
  </div>

  <div class="field">
    <label>Tipo de interés <span id="rateLabel">2.50%</span></label>
    <input type="range" id="rate" min="1.65" max="3.70" value="2.5" step="0.05">
    <div class="range-labels"><span>1.65%</span><span>3.70%</span></div>
  </div>

  <div class="results">
    <div class="row highlight">
      <span class="label">Cuota mensual</span>
      <span class="value" id="monthly">--</span>
    </div>
    <div class="row">
      <span class="label loan-label">Importe de la hipoteca (80%)</span>
      <span class="value" id="loanAmount">--</span>
    </div>
    <div class="row">
      <span class="label down-label">Entrada necesaria (20%)</span>
      <span class="value" id="downPayment">--</span>
    </div>
    <div class="row">
      <span class="label">Impuestos y gastos (~10%)</span>
      <span class="value" id="taxes">--</span>
    </div>
    <div class="row">
      <span class="label">Total necesario al inicio</span>
      <span class="value" id="totalUpfront">--</span>
    </div>
    <div class="row">
      <span class="label">Total pagado al banco</span>
      <span class="value" id="totalPaid">--</span>
    </div>
  </div>

  <div class="disclaimer">
    Simulación orientativa. Consulte con su entidad bancaria para una oferta vinculante.
  </div>
</div>

<script>
  const priceEl = document.getElementById('price');
  const yearsEl = document.getElementById('years');
  const rateEl = document.getElementById('rate');
  const financingBtns = document.querySelectorAll('#financing button');
  const yearsLabel = document.getElementById('yearsLabel');
  const rateLabel = document.getElementById('rateLabel');
  const monthlyEl = document.getElementById('monthly');
  const loanAmountEl = document.getElementById('loanAmount');
  const downPaymentEl = document.getElementById('downPayment');
  const taxesEl = document.getElementById('taxes');
  const totalUpfrontEl = document.getElementById('totalUpfront');
  const totalPaidEl = document.getElementById('totalPaid');
  let financePct = 0.8;

  function fmt(n) {
    return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
  }

  function calc() {
    const price = parseFloat(priceEl.value) || 0;
    const years = parseInt(yearsEl.value, 10);
    const rate = parseFloat(rateEl.value) / 100;

    yearsLabel.textContent = years + ' años';
    rateLabel.textContent = (rate * 100).toFixed(2) + '%';

    const loan = price * financePct;
    const down = price * (1 - financePct);
    const taxes = price * 0.1;
    const upfront = down + taxes;
    const pctDisplay = Math.round(financePct * 100);

    const n = years * 12;
    const r = rate / 12;
    let monthly = 0;
    if (rate > 0 && n > 0) {
      monthly = loan * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
    }

    loanAmountEl.textContent = fmt(loan);
    downPaymentEl.textContent = fmt(down);
    document.querySelector('.row .loan-label').textContent = 'Importe de la hipoteca (' + pctDisplay + '%)';
    document.querySelector('.row .down-label').textContent = 'Entrada necesaria (' + (100 - pctDisplay) + '%)';
    taxesEl.textContent = fmt(taxes);
    totalUpfrontEl.textContent = fmt(upfront);
    monthlyEl.textContent = fmt(monthly);
    totalPaidEl.textContent = fmt(monthly * n);
  }

  financingBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      financingBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      financePct = parseFloat(btn.dataset.value);
      calc();
    });
  });

  [priceEl, yearsEl, rateEl].forEach(el => el.addEventListener('input', calc));
  calc();

  const themeToggle = document.getElementById('themeToggle');
  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', theme);
  }
  themeToggle.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    setTheme(next);
  });
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    setTheme('dark');
  }
</script>
</body>
</html>
